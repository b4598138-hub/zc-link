<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

.custom-cursor {
  position: fixed; width: 32px; height: 32px;
  background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="white" stroke-width="1" opacity="0.5"/><circle cx="16" cy="16" r="2" fill="white" opacity="0.7"/></svg>') no-repeat center;
  background-size: contain; pointer-events: none; z-index: 10000;
  transform: translate(-50%,-50%); transition: transform 0.1s ease-out;
}

body:not(.touch-device) { cursor: none; }

body {
  background: #000; color: #fff; overflow: hidden;
  font-family: 'Courier New', monospace;
}

.container { width: 100%; height: 100vh; position: relative; }

#background {
  position: fixed; inset: 0; object-fit: cover; z-index: 1; pointer-events: none;
}

.glitch-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 2;
  opacity: 0; transition: opacity 0.5s;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
}

#hacker-overlay, #snow-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 3;
}

.hidden { display: none !important; }

.controls {
  position: fixed; bottom: calc(50% - 240px - 10px); left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 20;
  background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(5px);
}

.theme-button {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.3s; font-size: 14px; font-weight: bold; color: rgba(255,255,255,0.4); font-family: 'Courier New', monospace;
}

.theme-button:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.6); color: #fff; }

.top-controls {
  position: fixed; bottom: calc(50% - 240px - 60px); left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 15px; z-index: 20;
  background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 20px; backdrop-filter: blur(5px);
}

.volume-control, .transparency-control { display: flex; align-items: center; gap: 8px; }
.volume-icon, .transparency-icon { width: 20px; height: 20px; cursor: pointer; color: rgba(255,255,255,0.5); }

.slider {
  -webkit-appearance: none; appearance: none; width: 80px; height: 5px; border-radius: 5px;
  background: rgba(255,255,255,0.2); outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer;
}

#profile-block {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 820px; min-height: 332px;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
  padding: 20px; border-radius: 15px; z-index: 20;
  display: flex; flex-direction: column; gap: 15px;
  backdrop-filter: blur(10px); opacity: 0;
  transform-style: preserve-3d; transition: transform 0.5s ease-out;
  pointer-events: auto;
}

.profile-header { display: flex; align-items: flex-start; gap: 15px; }

.profile-container { position: relative; width: 150px; height: 150px; }

.profile-container::after {
  content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
  border-radius: 50%;
  background: conic-gradient(transparent 0deg, rgba(255,255,255,0.2) 60deg, transparent 120deg, transparent 360deg);
  animation: orbit 3s linear infinite; z-index: -1;
}

.profile-container.fast-orbit::after { animation: fast-orbit 0.5s linear forwards; }

.profile-picture {
  width: 150px; height: 150px; border-radius: 50%; object-fit: cover;
  cursor: pointer; pointer-events: auto; border: 2px solid rgba(255,255,255,0.06);
}

.profile-info { flex: 1; display: flex; flex-direction: column; }

.name-and-badges { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }

#profile-name {
  font-family: 'Orbitron', sans-serif; font-size: 32px; font-weight: 700;
  letter-spacing: 3px; color: #fff;
  text-shadow: 0 0 10px rgba(255,255,255,0.3); white-space: nowrap;
}

.badge-box { background: rgba(255,255,255,0.06); padding: 2px; border-radius: 12px; }

.badge-box-inner {
  background: rgba(0,0,0,0.3); padding: 4px 6px; border-radius: 10px;
  display: flex; gap: 6px;
}

.badge-group { display: flex; flex-wrap: wrap; gap: 6px; }

.badge-container { position: relative; pointer-events: auto; }

.badge-container .tooltip {
  visibility: hidden; width: 120px;
  background: rgba(0,0,0,0.85); color: #fff; text-align: center;
  border-radius: 6px; padding: 4px 0; font-size: 11px;
  position: absolute; z-index: 100; bottom: 125%; left: 50%; margin-left: -60px;
  opacity: 0; transition: opacity 0.3s;
}

.badge-container:hover .tooltip { visibility: visible; opacity: 1; }

.badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; font-size: 10px; font-weight: 700;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px; color: rgba(255,255,255,0.5);
  transition: all 0.3s; cursor: help;
}

.badge:hover { transform: scale(1.15); background: rgba(255,255,255,0.1); color: #fff; }

#profile-bio { color: rgba(255,255,255,0.5); font-size: 16px; line-height: 1.5; margin-bottom: 10px; min-height: 24px; }

.bio-separator { width: 100%; height: 1px; background: rgba(255,255,255,0.05); margin: 20px 0; }

.profile-footer { display: flex; flex-direction: column; gap: 5px; width: 100%; margin-top: auto; }

.visitor-counter {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 20px;
  font-size: 13px; align-self: flex-start; position: relative;
  border: 1px solid rgba(255,255,255,0.04);
}

.visitor-icon { width: 18px; height: 18px; color: rgba(255,255,255,0.3); }

.visitor-counter .tooltip {
  visibility: hidden; width: 110px;
  background: rgba(0,0,0,0.85); color: #fff; text-align: center;
  border-radius: 6px; padding: 4px 0; font-size: 11px;
  position: absolute; z-index: 100; top: -35px; left: 50%; margin-left: -55px;
  opacity: 0; transition: opacity 0.3s;
}

.visitor-counter:hover .tooltip { visibility: visible; opacity: 1; }

.social-links { display: flex; gap: 12px; pointer-events: auto; }

.social-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50%; color: rgba(255,255,255,0.3);
  transition: all 0.3s; text-decoration: none; font-size: 18px;
}

.social-icon:hover { transform: scale(1.4) rotateY(15deg); border-color: rgba(255,255,255,0.3); color: #fff; }

/* skills */
#skills-block {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 820px; min-height: 332px;
  background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.08);
  padding: 20px; border-radius: 15px; z-index: 20;
  display: flex; flex-direction: column; gap: 15px;
  backdrop-filter: blur(10px); transform-style: preserve-3d; transition: transform 0.5s ease-out;
}

.skills-title { text-align: center; font-size: 24px; margin-bottom: 15px; letter-spacing: 2px; }

.skill { display: flex; flex-direction: column; gap: 5px; }

.skill-name { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

.skill-bar-container { height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; }

.skill-bar { height: 100%; border-radius: 5px; width: 0%; transition: width 2s; background: rgba(255,255,255,0.25); }

/* results button */
#results-button-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }

#results-theme {
  background: rgba(0,0,0,0.7); color: #fff; border: 1px solid rgba(255,255,255,0.12);
  padding: 8px 15px; border-radius: 20px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 14px;
  backdrop-filter: blur(5px); transition: all 0.3s;
}

#results-theme:hover { background: rgba(0,0,0,0.9); border-color: rgba(255,255,255,0.3); }

#results-hint {
  position: absolute; background: rgba(0,0,0,0.8); color: #fff;
  padding: 8px 12px; border-radius: 10px; font-size: 12px;
  width: 180px; text-align: center; pointer-events: none; z-index: 25;
  backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.08);
}

#results-hint::before {
  content: ''; position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
  border: 10px solid transparent; border-bottom-color: rgba(0,0,0,0.8);
}

/* start screen */
#start-screen {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92); backdrop-filter: blur(10px);
  display: flex; align-items: center; justify-content: center;
  z-index: 30; cursor: pointer;
}

#start-text { font-family: 'Courier New', monospace; font-size: 24px; color: #fff; text-align: center; }

/* animations */
.glitch { animation: glitch 0.2s ease-in-out; }

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(-2px,-2px); }
  60% { transform: translate(2px,2px); }
  80% { transform: translate(2px,-2px); }
  100% { transform: translate(0); }
}

@keyframes orbit {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fast-orbit {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@media (max-width: 860px) {
  #profile-block, #skills-block { width: 92vw; max-width: 350px; padding: 15px; }
  .profile-header { flex-direction: column; align-items: center; }
  .profile-container { width: 120px; height: 120px; }
  .profile-picture { width: 120px; height: 120px; }
  .profile-info { align-items: center; text-align: center; }
  .name-and-badges { flex-direction: column; align-items: center; }
  #profile-name { font-size: 24px; }
  .badge-group { justify-content: center; }
  .visitor-counter { align-self: center; }
  .social-links { justify-content: center; }
  .controls { bottom: 20px; }
  .top-controls { bottom: 70px; }
  #start-text { font-size: 18px; }
}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<script>
(function() {
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  if (isTouch) document.body.classList.add('touch-device');

  // cursor
  const cursor = document.querySelector('.custom-cursor');
  if (!isTouch) {
    document.addEventListener('mousemove', e => { cursor.style.left=e.clientX+'px'; cursor.style.top=e.clientY+'px'; });
    document.addEventListener('mousedown', () => { cursor.style.transform='translate(-50%,-50%) scale(0.8)'; });
    document.addEventListener('mouseup', () => { cursor.style.transform='translate(-50%,-50%) scale(1)'; });
    document.querySelectorAll('a, button, .theme-button, .badge, .profile-picture, .social-icon').forEach(el => {
      el.addEventListener('mouseenter', () => { cursor.style.width='48px'; cursor.style.height='48px'; });
      el.addEventListener('mouseleave', () => { cursor.style.width='32px'; cursor.style.height='32px'; });
    });
  }

  // bg
  const bg = document.getElementById('background');
  const bctx = bg.getContext('2d');
  let bw, bh, dots = [];

  function resizeBg() { bw=bg.width=innerWidth; bh=bg.height=innerHeight; }
  resizeBg(); addEventListener('resize', resizeBg);

  for (let i = 60; i--;) dots.push({ x:Math.random()*bw, y:Math.random()*bh, vx:(Math.random()-.5)*.2, vy:(Math.random()-.5)*.2, r:Math.random()*2+.5, a:Math.random()*.15+.05 });

  (function draw() {
    bctx.clearRect(0,0,bw,bh);
    dots.forEach(p => { p.x+=p.vx; p.y+=p.vy; if(p.x<0)p.x=bw; if(p.x>bw)p.x=0; if(p.y<0)p.y=bh; if(p.y>bh)p.y=0;
      bctx.beginPath(); bctx.arc(p.x,p.y,p.r,0,6); bctx.fillStyle=`rgba(255,255,255,${p.a})`; bctx.fill(); });
    for(let i=0;i<dots.length;i++) for(let j=i+1;j<dots.length;j++) {
      const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<100){bctx.beginPath();bctx.moveTo(dots[i].x,dots[i].y);bctx.lineTo(dots[j].x,dots[j].y);bctx.strokeStyle=`rgba(255,255,255,${.015*(1-d/100)})`;bctx.lineWidth=.5;bctx.stroke();}
    }
    requestAnimationFrame(draw);
  })();

  // matrix
  const hc = document.getElementById('hacker-overlay');
  const hctx = hc.getContext('2d');
  const sc = document.getElementById('snow-overlay');
  const sctx = sc.getContext('2d');
  let hw, hh, mCols, mDrops, snow = [];

  function resizeO() { hw=hc.width=sc.width=innerWidth; hh=hc.height=sc.height=innerHeight; }
  resizeO(); addEventListener('resize', resizeO);
  mCols = Math.floor(hw/14); mDrops = Array(mCols).fill(0);
  for (let i = 80; i--;) snow.push({x:Math.random()*hw, y:Math.random()*hh, r:Math.random()*3+1, s:Math.random()*1+.5, o:Math.random()*.4+.1});

  let mInt=null, sInt=null;

  function startM() {
    hc.classList.remove('hidden'); mCols=Math.floor(hw/14); mDrops=Array(mCols).fill(0);
    if(mInt)clearInterval(mInt); mInt=setInterval(()=>{
      hctx.fillStyle='rgba(0,0,0,0.05)';hctx.fillRect(0,0,hw,hh);
      hctx.fillStyle='rgba(255,255,255,0.04)';hctx.font='13px monospace';
      for(let i=0;i<mCols;i++){hctx.fillText(String.fromCharCode(0x30A0+Math.random()*96),i*14,mDrops[i]*14);if(mDrops[i]*14>hh&&Math.random()>.975)mDrops[i]=0;mDrops[i]++;}
    },60);
  }

  function startS() {
    sc.classList.remove('hidden');
    if(sInt)clearInterval(sInt); sInt=setInterval(()=>{
      sctx.clearRect(0,0,hw,hh);
      snow.forEach(f=>{f.y+=f.s;f.x+=Math.sin(f.y*.01)*.3;if(f.y>hh){f.y=-5;f.x=Math.random()*hw;}
        sctx.beginPath();sctx.arc(f.x,f.y,f.r,0,6);sctx.fillStyle=`rgba(255,255,255,${f.o})`;sctx.fill();});
    },30);
  }

  function stopO() { if(mInt){clearInterval(mInt);mInt=null;} if(sInt){clearInterval(sInt);sInt=null;} hc.classList.add('hidden');sc.classList.add('hidden');hctx.clearRect(0,0,hw,hh);sctx.clearRect(0,0,hw,hh); }

  // start screen
  const ss = document.getElementById('start-screen');
  const st = document.getElementById('start-text');
  const pn = document.getElementById('profile-name');
  const pb = document.getElementById('profile-bio');
  const vc = document.getElementById('visitor-count');
  const pbBlock = document.getElementById('profile-block');
  const skBlock = document.getElementById('skills-block');
  const pc = document.querySelector('.profile-container');
  const pp = document.querySelector('.profile-picture');
  const go = document.querySelector('.glitch-overlay');

  // visitor
  let v = parseInt(localStorage.getItem('zc_v')||'0'); v++; localStorage.setItem('zc_v',v);
  vc.textContent = v.toLocaleString();

  // start type
  const sm = 'click to enter'; let si=0, sc=true;
  (function ts(){if(si<sm.length)si++;st.textContent=sm.slice(0,si)+(sc?'|':' ');setTimeout(ts,100);})();
  setInterval(()=>{sc=!sc;st.textContent=sm.slice(0,si)+(sc?'|':' ');},500);

  // name type
  const nm='z c';let ni=0,nd=false,nc=true;
  (function tn(){if(!nd&&ni<nm.length)ni++;else if(nd&&ni>0)ni--;else if(ni===nm.length){nd=true;setTimeout(tn,10000);return;}else if(ni===0)nd=false;
    pn.textContent=nm.slice(0,ni)+(nc?'|':' ');
    if(Math.random()<.05){pn.classList.add('glitch');setTimeout(()=>pn.classList.remove('glitch'),200);}
    setTimeout(tn,nd?150:300);})();
  setInterval(()=>{nc=!nc;},500);

  // bio type
  const bs=["z c","mon blaze","noir & blanc"];let bm=0,bi=0,bd=false,bc=true;
  (function tb(){const l=bs[bm];
    if(!bd&&bi<l.length)bi++;else if(bd&&bi>0)bi--;else if(bi===l.length){bd=true;setTimeout(tb,2000);return;}else if(bi===0&&bd){bd=false;bm=(bm+1)%bs.length;}
    pb.textContent=l.slice(0,bi)+(bc?'|':' ');
    if(Math.random()<.05){pb.classList.add('glitch');setTimeout(()=>pb.classList.remove('glitch'),200);}
    setTimeout(tb,bd?75:150);})();
  setInterval(()=>{bc=!bc;},500);

  // reveal
  function rv(){
    ss.classList.add('hidden');
    pbBlock.classList.remove('hidden');
    gsap.fromTo(pbBlock,{opacity:0,y:-50},{opacity:1,y:0,duration:1,ease:'power2.out',onComplete:()=>{pc.style.animation='orbit 3s linear infinite';}});
    tn();tb();
    setInterval(()=>{if(Math.random()>.6){go.style.opacity='.2';setTimeout(()=>go.style.opacity='0',200);}},5000);
  }
  ss.addEventListener('click',rv);
  ss.addEventListener('touchstart',e=>{e.preventDefault();rv();});

  // fast orbit
  pp.addEventListener('click',()=>{pc.classList.remove('fast-orbit');pc.style.animation='none';void pc.offsetWidth;pc.classList.add('fast-orbit');setTimeout(()=>{pc.classList.remove('fast-orbit');void pc.offsetWidth;pc.style.animation='orbit 3s linear infinite';},500);});

  // tilt
  if(!isTouch){
    pbBlock.addEventListener('mousemove',e=>{const r=pbBlock.getBoundingClientRect();gsap.to(pbBlock,{rotationX:(e.clientY-r.top-r.height/2)/r.height*10,rotationY:-(e.clientX-r.left-r.width/2)/r.width*10,duration:.3,ease:'power2.out',transformPerspective:1000});});
    pbBlock.addEventListener('mouseleave',()=>{gsap.to(pbBlock,{rotationX:0,rotationY:0,duration:.5,ease:'power2.out'});});
  }

  // skills toggle
  const rb = document.getElementById('results-theme');
  const rh = document.getElementById('results-hint');
  const rc = document.getElementById('results-button-container');
  let sk = false;

  function tg(){
    if(!sk){
      gsap.to(pbBlock,{x:-100,opacity:0,duration:.5,ease:'power2.in',onComplete:()=>{
        pbBlock.classList.add('hidden');skBlock.classList.remove('hidden');
        gsap.fromTo(skBlock,{x:100,opacity:0},{x:0,opacity:1,duration:.5,ease:'power2.out'});
        document.querySelectorAll('.skill-bar').forEach(b=>{b.style.width=b.dataset.w+'%';});
      }});
      rh.classList.remove('hidden');sk=true;
    } else {
      gsap.to(skBlock,{x:100,opacity:0,duration:.5,ease:'power2.in',onComplete:()=>{
        skBlock.classList.add('hidden');pbBlock.classList.remove('hidden');
        gsap.fromTo(pbBlock,{x:-100,opacity:0},{x:0,opacity:1,duration:.5,ease:'power2.out'});
      }});
      rh.classList.add('hidden');sk=false;
    }
  }
  rb.addEventListener('click',tg);

  // themes
  const tbs = document.querySelectorAll('.theme-button');
  const themes = ['home','hacker','rain','snow','dark'];
  tbs.forEach((btn,i)=>{
    btn.addEventListener('click',()=>{
      tbs.forEach(b=>b.classList.remove('active'));btn.classList.add('active');
      stSwitch(themes[i]);
    });
  });

  function stSwitch(t) {
    stopO();
    if(t==='hacker'){startM();rc.classList.remove('hidden');}
    else if(t==='rain'){startM();}
    else if(t==='snow'){startS();rc.classList.remove('hidden');}
    else{rc.classList.add('hidden');if(sk){skBlock.classList.add('hidden');pbBlock.classList.remove('hidden');gsap.set(pbBlock,{opacity:1,x:0});sk=false;rh.classList.add('hidden');}}
    go.style.opacity='.3';setTimeout(()=>go.style.opacity='0',200);
  }

  // volume
  const vs = document.getElementById('volume-slider');
  const vi = document.getElementById('volume-icon');
  vs.addEventListener('input',()=>{});
  vi.addEventListener('click',()=>{
    vi.innerHTML = vi.innerHTML.includes('M5.586')
      ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>'
      : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/>';
  });

  // transparency
  const ts = document.getElementById('transparency-slider');
  ts.addEventListener('input',()=>{const o=ts.value;pbBlock.style.background=`rgba(0,0,0,${o})`;skBlock.style.background=`rgba(0,0,0,${o})`;});
})();
</script>
</body>
</html>
