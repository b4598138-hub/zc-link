<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#start-screen {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: pointer;
}

#start-text {
  font-size: 20px;
  color: #fff;
  text-align: center;
  letter-spacing: 2px;
}

.container {
  width: 100%;
  max-width: 520px;
  padding: 24px;
  position: relative;
}

.card {
  background: rgba(0,0,0,0.85);
  border: 1px solid rgba(255,255,255,0.15);
  padding: 32px;
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
  object-fit: cover;
  margin-bottom: 20px;
  transition: transform 0.3s;
}

.avatar:hover { transform: scale(1.05); }

.blaze {
  font-family: 'Orbitron', sans-serif;
  font-size: 48px;
  font-weight: 900;
  letter-spacing: 6px;
  margin-bottom: 8px;
  color: #fff;
}

.bio {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 32px;
  min-height: 20px;
  letter-spacing: 1px;
}

.separator {
  width: 60px;
  height: 1px;
  background: rgba(255,255,255,0.2);
  margin: 24px auto;
}

.links {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 24px;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-family: 'Courier New', monospace;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.link-btn:hover {
  background: #fff;
  color: #000;
  border-color: #fff;
}

.link-btn svg {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
}

.footer {
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 2px;
  margin-top: 8px;
}

.custom-cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.15s, height 0.15s, border-color 0.15s;
}

.custom-cursor.hover {
  width: 32px;
  height: 32px;
  border-color: rgba(255,255,255,0.6);
}

@media (max-width: 480px) {
  .blaze { font-size: 36px; letter-spacing: 4px; }
  .card { padding: 24px; }
  .avatar { width: 100px; height: 100px; }
}
</style>
</head>
<body>

<div class="custom-cursor" id="cursor"></div>

<div id="start-screen">
  <div id="start-text"></div>
</div>

<div class="container">
  <div class="card" id="card">
    <img src="https://i.imgur.com/mvPLW4j.png" alt="pfp" class="avatar" onerror="this.style.display='none'">
    <div class="blaze">z c</div>
    <div class="bio" id="bio"></div>

    <div class="separator"></div>

    <div class="links" id="links">
      <a href="https://discord.gg/zc" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 21a6 6 0 0112 0"/></svg>
        discord
      </a>
      <a href="https://github.com/b4598138-hub" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
        github
      </a>
      <a href="https://tiktok.com/@zc" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
        tiktok
      </a>
    </div>

    <div class="footer">z c</div>
  </div>
</div>

<script>
(function() {
  const cursor = document.getElementById('cursor');
  const isTouch = window.matchMedia('(pointer: coarse)').matches;

  if (!isTouch) {
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, .link-btn').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  } else {
    cursor.style.display = 'none';
  }

  const startScreen = document.getElementById('start-screen');
  const startText = document.getElementById('start-text');
  const bio = document.getElementById('bio');
  const card = document.getElementById('card');

  const msg = "click to enter";
  let idx = 0;
  let showCursor = true;

  function typeStart() {
    if (idx < msg.length) idx++;
    startText.textContent = msg.slice(0, idx) + (showCursor ? '|' : ' ');
    setTimeout(typeStart, 80);
  }

  setInterval(() => {
    showCursor = !showCursor;
    startText.textContent = msg.slice(0, idx) + (showCursor ? '|' : ' ');
  }, 500);

  typeStart();

  const bioLines = ["z c", "mon blaze"];
  let bioIdx = 0;
  let charIdx = 0;
  let deleting = false;
  let bioCursor = true;

  function typeBio() {
    const line = bioLines[bioIdx];
    if (!deleting && charIdx < line.length) charIdx++;
    else if (deleting && charIdx > 0) charIdx--;
    else if (charIdx === line.length) { deleting = true; setTimeout(typeBio, 2000); return; }
    else if (charIdx === 0 && deleting) { deleting = false; bioIdx = (bioIdx + 1) % bioLines.length; }

    bio.textContent = line.slice(0, charIdx) + (bioCursor ? '|' : '');
    setTimeout(typeBio, deleting ? 50 : 100);
  }

  setInterval(() => { bioCursor = !bioCursor; }, 500);

  function reveal() {
    startScreen.style.display = 'none';
    card.classList.add('visible');
    typeBio();
  }

  startScreen.addEventListener('click', reveal);
  startScreen.addEventListener('touchstart', e => { e.preventDefault(); reveal(); });
})();
</script>
</body>
</html>
