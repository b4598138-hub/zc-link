<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="home-theme">

<div class="custom-cursor"></div>
<div id="start-screen"><div id="start-text"></div></div>

<div class="container">
  <canvas id="background"></canvas>
  <div class="glitch-overlay"></div>
  <canvas id="hacker-overlay" class="hidden"></canvas>
  <canvas id="snow-overlay" class="hidden"></canvas>

  <div id="profile-block">

      <div class="profile-container">
        <img src="https://i.imgur.com/mvPLW4j.png" alt="" class="profile-picture" onerror="this.style.display='none'">
      </div>
      <div class="profile-info">
        <div class="name-and-badges">
          <div id="profile-name"></div>
          <div class="badge-box">
            <div class="badge-box-inner">
              <div class="badge-group">

                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23ffd700' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%23ffd700' font-size='14' font-weight='bold' font-family='monospace'%3EO%3C/text%3E%3C/svg%3E" alt="Owner" class="badge"><span class="tooltip">Owner</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23555' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%23fff' font-size='14' font-weight='bold' font-family='monospace'%3EP%3C/text%3E%3C/svg%3E" alt="Partner" class="badge"><span class="tooltip">Partner</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23555' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%230af' font-size='11' font-weight='bold' font-family='monospace'%3E%3C/%3E%3Ctext%3E%3C/svg%3E" alt="Developer" class="badge"><span class="tooltip">Developer</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23555' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%23fff' font-size='14' font-weight='bold' font-family='monospace'%3E%E2%98%85%3C/text%3E%3C/svg%3E" alt="Bug Bounty" class="badge"><span class="tooltip">Bug Bounty</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23f44' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%23f44' font-size='14' font-weight='bold' font-family='monospace'%3EG%3C/text%3E%3C/svg%3E" alt="Hated by Guns.lol" class="badge"><span class="tooltip">Hated by Guns.lol</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%23f44' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%23f44' font-size='14' font-weight='bold' font-family='monospace'%3EF%3C/text%3E%3C/svg%3E" alt="Hated by Fakecrime" class="badge"><span class="tooltip">Hated by Fakecrime.bio</span></div>
                <div class="badge-container"><img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 22 22'%3E%3Crect width='22' height='22' rx='4' fill='%23333' stroke='%230a0' stroke-width='1'/%3E%3Ctext x='11' y='16' text-anchor='middle' fill='%230a0' font-size='14' font-weight='bold' font-family='monospace'%3E%E2%9C%93%3C/text%3E%3C/svg%3E" alt="Verified" class="badge"><span class="tooltip">Verified</span></div>

              </div>
            </div>
          </div>
        </div>
        <div id="profile-bio"></div>
      </div>
    </div>
    <div class="bio-separator"></div>
    <div class="profile-footer">
      <div class="social-links">
        <a href="https://discord.gg/zc" target="_blank" class="social-icon">&#9670;</a>
        <a href="https://github.com/b4598138-hub" target="_blank" class="social-icon">&#9672;</a>
        <a href="https://tiktok.com/@zc" target="_blank" class="social-icon">&#9830;</a>
      </div>
      <div class="visitor-counter">
        <svg class="visitor-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        <span id="visitor-count">0</span>
        <span class="tooltip">Profile Views</span>
      </div>
    </div>
  </div>

  <div id="skills-block" class="hidden">
    <h2 class="skills-title">Skills</h2>
    <div class="skill"><div class="skill-name"><span>Python</span><span>87%</span></div><div class="skill-bar-container"><div class="skill-bar" data-w="87"></div></div></div>
    <div class="skill"><div class="skill-name"><span>JavaScript</span><span>80%</span></div><div class="skill-bar-container"><div class="skill-bar" data-w="80"></div></div></div>
    <div class="skill"><div class="skill-name"><span>C++</span><span>65%</span></div><div class="skill-bar-container"><div class="skill-bar" data-w="65"></div></div></div>
    <div class="skill"><div class="skill-name"><span>Rust</span><span>55%</span></div><div class="skill-bar-container"><div class="skill-bar" data-w="55"></div></div></div>
  </div>

  <div id="results-button-container" class="hidden">
    <button id="results-theme">View Skills</button>
    <div id="results-hint" class="hidden">Click again to return</div>
  </div>

  <div class="controls">
    <div class="theme-button active">1</div>
    <div class="theme-button">2</div>
    <div class="theme-button">3</div>
    <div class="theme-button">4</div>
    <div class="theme-button">5</div>
  </div>

  <div class="top-controls">
    <div class="volume-control">
      <svg class="volume-icon" id="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/></svg>
      <input id="volume-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.3">
    </div>
    <div class="transparency-control">
      <svg class="transparency-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      <input id="transparency-slider" class="slider" type="range" min="0" max="1" step="0.01" value="0.7">
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="script.js"></script>
</body>
</html>
