<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  color: #fff;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* canvas matrix */
#matrix-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  opacity: 0.15;
  pointer-events: none;
}

/* particles */
#particles-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(255,255,255,0.015) 2px,
    rgba(255,255,255,0.015) 4px
  );
}

/* start screen */
#start-screen {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  cursor: pointer;
}

#start-text {
  font-size: 20px;
  color: #fff;
  text-align: center;
  letter-spacing: 3px;
}

#start-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.2);
  margin-top: 16px;
  letter-spacing: 1px;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.2; }
  50% { opacity: 0.5; }
}

/* container */
.container {
  width: 100%;
  max-width: 520px;
  padding: 24px;
  position: relative;
  z-index: 2;
  perspective: 1000px;
}

/* card */
.card {
  background: rgba(0,0,0,0.8);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 40px 32px;
  text-align: center;
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: opacity 0.8s ease, transform 0.8s ease;
  position: relative;
  overflow: hidden;
}

.card.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* card animated border */
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  pointer-events: none;
  z-index: -1;
  animation: borderPulse 3s ease-in-out infinite;
}

@keyframes borderPulse {
  0%, 100% { border-color: rgba(255,255,255,0.1); }
  50% { border-color: rgba(255,255,255,0.3); }
}

/* card scanning line */
.card::after {
  content: '';
  position: absolute;
  top: -100%;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
  animation: scan 4s linear infinite;
  pointer-events: none;
}

@keyframes scan {
  0% { top: -100%; }
  100% { top: 100%; }
}

/* avatar */
.avatar-wrapper {
  position: relative;
  width: 130px;
  height: 130px;
  margin: 0 auto 24px;
}

.avatar-ring {
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.15);
  animation: ringSpin 6s linear infinite;
}

@keyframes ringSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.avatar-ring::before {
  content: '';
  position: absolute;
  top: -1px;
  left: 50%;
  width: 8px;
  height: 8px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  transform: translateX(-50%);
}

.avatar {
  width: 130px;
  height: 130px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  object-fit: cover;
  transition: transform 0.4s ease;
  position: relative;
  z-index: 1;
}

.avatar:hover { transform: scale(1.06); }

/* blaze */
.blaze-wrapper {
  position: relative;
  display: inline-block;
  margin-bottom: 8px;
}

.blaze {
  font-family: 'Orbitron', sans-serif;
  font-size: 52px;
  font-weight: 900;
  letter-spacing: 8px;
  color: #fff;
  position: relative;
  display: inline-block;
  transition: text-shadow 0.3s;
}

.blaze.glitch {
  animation: glitch 0.3s ease-in-out 2;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-3px, 2px); }
  40% { transform: translate(3px, -1px); }
  60% { transform: translate(-2px, -2px); }
  80% { transform: translate(2px, 3px); }
  100% { transform: translate(0); }
}

.blaze-glow {
  position: absolute;
  inset: 0;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-size: 52px;
  font-weight: 900;
  letter-spacing: 8px;
  opacity: 0.15;
  filter: blur(8px);
  pointer-events: none;
  animation: glowPulse 3s ease-in-out infinite;
}

@keyframes glowPulse {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.25; }
}

/* bio */
.bio {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 28px;
  min-height: 22px;
  letter-spacing: 2px;
  font-style: italic;
}

/* separator */
.separator {
  width: 40px;
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 24px auto;
  transition: width 0.4s;
}

.card.visible .separator {
  width: 80px;
}

/* links */
.links {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 24px;
}

.link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 14px 20px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.12);
  color: #fff;
  text-decoration: none;
  font-size: 13px;
  font-family: 'Courier New', monospace;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}

.link-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.05);
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.35s ease;
}

.link-btn:hover::before {
  transform: scaleX(1);
  transform-origin: left;
}

.link-btn:hover {
  border-color: rgba(255,255,255,0.4);
  letter-spacing: 4px;
}

.link-btn svg {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  opacity: 0.5;
  transition: opacity 0.25s;
}

.link-btn:hover svg {
  opacity: 1;
}

/* link hover glow */
.link-btn::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  width: 0;
  height: 1px;
  background: rgba(255,255,255,0.3);
  transition: all 0.35s ease;
  transform: translateX(-50%);
}

.link-btn:hover::after {
  width: 60%;
}

/* visitor counter */
.visitor {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 11px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 1px;
  margin-bottom: 16px;
}

.visitor svg {
  width: 14px;
  height: 14px;
  opacity: 0.3;
}

/* footer */
.footer {
  font-size: 10px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* custom cursor */
.custom-cursor {
  position: fixed;
  width: 24px;
  height: 24px;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, border-color 0.2s, background 0.2s;
  backdrop-filter: invert(1) hue-rotate(180deg);
  mix-blend-mode: difference;
}

.custom-cursor.hover {
  width: 40px;
  height: 40px;
  border-color: rgba(255,255,255,0.5);
}

.cursor-dot {
  position: fixed;
  width: 3px;
  height: 3px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: opacity 0.5s;
}

/* responsive */
@media (max-width: 480px) {
  .blaze, .blaze-glow { font-size: 36px; letter-spacing: 5px; }
  .card { padding: 28px 20px; }
  .avatar, .avatar-wrapper { width: 100px; height: 100px; }
  .avatar-ring { inset: -3px; }
}

/* glitch overlay flash */
.glitch-flash {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  opacity: 0;
  background: rgba(255,255,255,0.03);
  transition: opacity 0.05s;
}
</style>
</head>
<body>

<div class="custom-cursor" id="cursor"></div>
<div class="glitch-flash" id="glitchFlash"></div>

<canvas id="matrix-canvas"></canvas>
<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>

<div id="start-screen">
  <div id="start-text"></div>
  <div id="start-sub">[ z c ]</div>
</div>

<div class="container">
  <div class="card" id="card">
    <div class="avatar-wrapper">
      <div class="avatar-ring"></div>
      <img src="https://i.imgur.com/mvPLW4j.png" alt="pfp" class="avatar" onerror="this.style.display='none'">
    </div>

    <div class="blaze-wrapper">
      <div class="blaze-glow">z c</div>
      <div class="blaze" id="blaze">z c</div>
    </div>
    <div class="bio" id="bio"></div>

    <div class="separator"></div>

    <div class="visitor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
      <span id="visitorCount">0</span> views
    </div>

    <div class="links" id="links">
      <a href="https://discord.gg/zc" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 21a6 6 0 0112 0"/></svg>
        discord
      </a>
      <a href="https://github.com/b4598138-hub" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/></svg>
        github
      </a>
      <a href="https://tiktok.com/@zc" target="_blank" class="link-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"/></svg>
        tiktok
      </a>
    </div>

    <div class="footer">z c</div>
  </div>
</div>

<script>
(function() {
  const isTouch = window.matchMedia('(pointer: coarse)').matches;

  // ── cursor ──
  const cursor = document.getElementById('cursor');
  if (!isTouch) {
    const dot = document.createElement('div');
    dot.className = 'cursor-dot';
    document.body.appendChild(dot);
    const trail = [];
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
      dot.style.left = e.clientX + 'px';
      dot.style.top = e.clientY + 'px';
      trail.push({ x: e.clientX, y: e.clientY });
      if (trail.length > 15) trail.shift();
    });
    document.querySelectorAll('a, button, .link-btn, .avatar').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  } else {
    cursor.style.display = 'none';
  }

  // ── matrix rain ──
  const mc = document.getElementById('matrix-canvas');
  const mctx = mc.getContext('2d');
  let mw, mh, cols, drops;

  function resizeMatrix() {
    mw = mc.width = window.innerWidth;
    mh = mc.height = window.innerHeight;
    cols = Math.floor(mw / 14);
    drops = Array(cols).fill(0);
  }
  resizeMatrix();
  window.addEventListener('resize', resizeMatrix);

  function drawMatrix() {
    mctx.fillStyle = 'rgba(0,0,0,0.05)';
    mctx.fillRect(0, 0, mw, mh);
    mctx.fillStyle = 'rgba(255,255,255,0.08)';
    mctx.font = '13px monospace';
    for (let i = 0; i < cols; i++) {
      const char = String.fromCharCode(0x30A0 + Math.random() * 96);
      const x = i * 14;
      const y = drops[i] * 14;
      mctx.fillText(char, x, y);
      if (y > mh && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }

  // ── particles ──
  const pc = document.getElementById('particles-canvas');
  const pctx = pc.getContext('2d');
  let pw, ph;
  const particles = [];

  function resizeParticles() {
    pw = pc.width = window.innerWidth;
    ph = pc.height = window.innerHeight;
  }
  resizeParticles();
  window.addEventListener('resize', resizeParticles);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * pw,
      y: Math.random() * ph,
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.4,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.5 + 0.1,
    });
  }

  let particleFrame;

  function drawParticles() {
    pctx.clearRect(0, 0, pw, ph);
    for (const p of particles) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0) p.x = pw;
      if (p.x > pw) p.x = 0;
      if (p.y < 0) p.y = ph;
      if (p.y > ph) p.y = 0;

      pctx.beginPath();
      pctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      pctx.fillStyle = `rgba(255,255,255,${p.a})`;
      pctx.fill();
    }
    // draw lines between nearby particles
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          pctx.beginPath();
          pctx.moveTo(particles[i].x, particles[i].y);
          pctx.lineTo(particles[j].x, particles[j].y);
          pctx.strokeStyle = `rgba(255,255,255,${0.03 * (1 - dist / 150)})`;
          pctx.lineWidth = 0.5;
          pctx.stroke();
        }
      }
    }
    particleFrame = requestAnimationFrame(drawParticles);
  }

  // ── start screen ──
  const startScreen = document.getElementById('start-screen');
  const startText = document.getElementById('start-text');
  const bio = document.getElementById('bio');
  const card = document.getElementById('card');
  const blaze = document.getElementById('blaze');
  const visitorCount = document.getElementById('visitorCount');
  const glitchFlash = document.getElementById('glitchFlash');

  // visitor counter
  let visits = parseInt(localStorage.getItem('zc_visits') || '0');
  visits++;
  localStorage.setItem('zc_visits', visits);
  visitorCount.textContent = visits;

  // typing start
  const msg = "click to enter";
  let idx = 0;
  let showCursor = true;

  function typeStart() {
    if (idx < msg.length) idx++;
    startText.textContent = msg.slice(0, idx) + (showCursor ? '|' : ' ');
    setTimeout(typeStart, 60);
  }

  setInterval(() => {
    showCursor = !showCursor;
    startText.textContent = msg.slice(0, idx) + (showCursor ? '|' : ' ');
  }, 530);

  typeStart();

  // ── reveal ──
  function reveal() {
    startScreen.style.display = 'none';
    card.classList.add('visible');
    typeBio();
    // start matrix & particles
    setInterval(drawMatrix, 50);
    drawParticles();
    // start glitch
    setInterval(() => {
      if (Math.random() > 0.7) {
        blaze.classList.add('glitch');
        glitchFlash.style.opacity = (Math.random() * 0.05).toString();
        setTimeout(() => {
          blaze.classList.remove('glitch');
          glitchFlash.style.opacity = '0';
        }, 300);
      }
    }, 4000);
    // 3d tilt
    if (!isTouch) {
      card.addEventListener('mousemove', e => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = (y - centerY) / centerY * -5;
        const rotateY = (x - centerX) / centerX * 5;
        card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale(1)';
      });
    }
  }

  startScreen.addEventListener('click', reveal);
  startScreen.addEventListener('touchstart', e => { e.preventDefault(); reveal(); });

  // ── bio typing ──
  const bioLines = [
    "z c",
    "mon blaze",
    "noir & blanc"
  ];
  let bioIdx = 0;
  let charIdx = 0;
  let deleting = false;
  let bioCursor = true;

  function typeBio() {
    const line = bioLines[bioIdx];
    if (!deleting) {
      if (charIdx < line.length) charIdx++;
      else { setTimeout(typeBio, 2500); return; }
    } else {
      if (charIdx > 0) charIdx--;
      else {
        deleting = false;
        bioIdx = (bioIdx + 1) % bioLines.length;
      }
    }
    bio.textContent = line.slice(0, charIdx) + (bioCursor ? '▌' : '');
    setTimeout(typeBio, deleting ? 30 : 80);
    // switch to delete mode after full text
    if (charIdx === line.length && !deleting) {
      deleting = true;
    }
  }

  setInterval(() => { bioCursor = !bioCursor; }, 530);
})();
</script>
</body>
</html>
