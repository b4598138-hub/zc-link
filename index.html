<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }

.custom-cursor {
  position: fixed;
  width: 32px;
  height: 32px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, background 0.2s, border-color 0.2s;
}

.custom-cursor.hover { width: 48px; height: 48px; background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.5); }

body:not(.touch-device) { cursor: none; }

body {
  background: #000;
  color: #fff;
  overflow: hidden;
}

.container { width: 100%; height: 100vh; position: relative; }

#background-canvas {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
}

.glitch-overlay {
  position: fixed; inset: 0; pointer-events: none; z-index: 2;
  opacity: 0; transition: opacity 0.3s;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
}

#overlay-canvas {
  position: fixed; inset: 0; pointer-events: none; z-index: 3; display: none;
}

.hidden { display: none !important; }

/* controls */
.controls {
  position: fixed; bottom: calc(50% - 240px - 10px); left: 50%; transform: translateX(-50%);
  display: flex; gap: 10px; z-index: 20;
  background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 20px; backdrop-filter: blur(5px);
}

.theme-button {
  width: 30px; height: 30px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.5);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
  font-size: 13px; font-weight: bold; color: rgba(255,255,255,0.5);
}

.theme-button:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.6); color: #fff; }
.theme-button.active { border-color: rgba(255,255,255,0.6); color: #fff; }

/* top controls */
.top-controls {
  position: fixed; bottom: calc(50% - 240px - 60px); left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 15px; z-index: 20;
  background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 20px; backdrop-filter: blur(5px);
}

.volume-control, .transparency-control { display: flex; align-items: center; gap: 8px; }

.volume-icon, .transparency-icon { width: 20px; height: 20px; cursor: pointer; color: rgba(255,255,255,0.5); transition: color 0.2s; }
.volume-icon:hover, .transparency-icon:hover { color: #fff; }

.slider {
  -webkit-appearance: none; appearance: none;
  width: 80px; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.15); outline: none;
}
.slider::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 12px; height: 12px; border-radius: 50%;
  background: rgba(255,255,255,0.5); cursor: pointer; transition: background 0.2s;
}
.slider::-webkit-slider-thumb:hover { background: #fff; }

/* profile block */
#profile-block {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 820px; min-height: 332px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 20px; border-radius: 15px;
  z-index: 20;
  display: flex; flex-direction: column; gap: 12px;
  backdrop-filter: blur(10px);
  opacity: 0;
  transform-style: preserve-3d;
  transition: transform 0.5s ease-out;
  pointer-events: auto;
}

.profile-header { display: flex; align-items: flex-start; gap: 15px; }

.profile-container {
  position: relative; width: 150px; height: 150px; flex-shrink: 0;
}

.profile-container::after {
  content: ''; position: absolute;
  top: -2px; left: -2px; right: -2px; bottom: -2px;
  border-radius: 50%;
  background: conic-gradient(transparent 0deg, rgba(255,255,255,0.3) 60deg, transparent 120deg, transparent 360deg);
  animation: orbit 3s linear infinite;
  z-index: -1;
}

.profile-container.fast-orbit::after {
  animation: fast-orbit 0.5s linear forwards;
}

.profile-picture {
  width: 150px; height: 150px; border-radius: 50%;
  object-fit: cover; cursor: pointer; pointer-events: auto;
  border: 2px solid rgba(255,255,255,0.1);
}

.profile-info { flex: 1; display: flex; flex-direction: column; }

.name-and-badges {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
  flex-wrap: wrap;
}

#profile-name {
  font-size: 32px; font-weight: bold; letter-spacing: 3px;
  color: #fff; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
  white-space: nowrap;
}

.badge-box {
  background: rgba(255,255,255,0.06); padding: 2px; border-radius: 12px;
}
.badge-box-inner {
  background: rgba(0,0,0,0.3); padding: 4px 6px; border-radius: 10px;
  display: flex; gap: 6px;
}

.badge-group { display: flex; flex-wrap: wrap; gap: 6px; }

.badge-container { position: relative; pointer-events: auto; }

.badge-container .tooltip {
  visibility: hidden; width: 110px;
  background: rgba(0,0,0,0.85); color: #fff;
  text-align: center; border-radius: 6px; padding: 4px 0;
  position: absolute; z-index: 100; bottom: 125%; left: 50%; margin-left: -55px;
  opacity: 0; transition: opacity 0.3s; font-size: 11px;
  border: 1px solid rgba(255,255,255,0.1);
}

.badge-container:hover .tooltip { visibility: visible; opacity: 1; }

.badge {
  width: 22px; height: 22px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: bold;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  transition: all 0.3s;
  pointer-events: auto;
  cursor: help;
}

.badge:hover { transform: scale(1.15); background: rgba(255,255,255,0.2); }

.badge.verified { color: #aaa; border-color: rgba(255,255,255,0.3); }

#profile-bio {
  color: rgba(255,255,255,0.6); font-size: 15px;
  line-height: 1.5; margin-bottom: 8px; min-height: 22px;
}

.bio-separator { width: 100%; height: 1px; background: rgba(255,255,255,0.08); margin: 12px 0; }

.profile-footer { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: auto; }

.visitor-counter {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 20px;
  font-size: 13px; align-self: flex-start; position: relative;
  border: 1px solid rgba(255,255,255,0.06);
}

.visitor-icon { width: 16px; height: 16px; color: rgba(255,255,255,0.4); }

.visitor-counter .tooltip {
  visibility: hidden; width: 120px;
  background: rgba(0,0,0,0.85); color: #fff;
  text-align: center; border-radius: 6px; padding: 4px 0;
  position: absolute; z-index: 100; top: -35px; left: 50%; margin-left: -60px;
  opacity: 0; transition: opacity 0.3s; font-size: 11px;
  border: 1px solid rgba(255,255,255,0.1);
}

.visitor-counter:hover .tooltip { visibility: visible; opacity: 1; }

.social-links {
  display: flex; gap: 10px; pointer-events: auto;
}

.social-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 36px; height: 36px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  color: rgba(255,255,255,0.4);
  transition: all 0.3s;
  text-decoration: none;
  font-size: 16px;
}

.social-icon:hover {
  transform: scale(1.2) rotateY(10deg);
  border-color: rgba(255,255,255,0.3);
  color: #fff;
}

/* skills block */
#skills-block {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 820px; min-height: 332px;
  background: rgba(0,0,0,0.7);
  border: 1px solid rgba(255,255,255,0.12);
  padding: 20px; border-radius: 15px;
  z-index: 20;
  display: flex; flex-direction: column; gap: 15px;
  backdrop-filter: blur(10px);
  transform-style: preserve-3d;
  transition: transform 0.5s ease-out;
}

.skills-title { text-align: center; font-size: 22px; letter-spacing: 2px; margin-bottom: 10px; }

.skill { display: flex; flex-direction: column; gap: 5px; }

.skill-name { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }

.skill-bar-container { height: 8px; background: rgba(255,255,255,0.06); border-radius: 4px; overflow: hidden; }

.skill-bar { height: 100%; border-radius: 4px; width: 0%; transition: width 2s; background: rgba(255,255,255,0.3); }

/* results button */
#results-button-container {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20;
}

#results-theme {
  background: rgba(0,0,0,0.7); color: #fff;
  border: 1px solid rgba(255,255,255,0.15);
  padding: 8px 16px; border-radius: 20px; cursor: pointer;
  font-family: 'Courier New', monospace; font-size: 13px;
  backdrop-filter: blur(5px); transition: all 0.3s;
}

#results-theme:hover { background: rgba(0,0,0,0.9); border-color: rgba(255,255,255,0.3); }

#results-hint {
  position: absolute; background: rgba(0,0,0,0.8); color: #fff;
  padding: 8px 12px; border-radius: 10px;
  font-size: 11px; width: 180px; text-align: center;
  pointer-events: none; z-index: 25;
  backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
}

/* start screen */
#start-screen {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 30; cursor: pointer;
}

#start-text {
  font-size: 22px; color: #fff; text-align: center; letter-spacing: 1px;
}

/* animations */
.glitch-text { animation: glitch 0.2s ease-in-out; }

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(-2px, -2px); }
  60% { transform: translate(2px, 2px); }
  80% { transform: translate(2px, -2px); }
  100% { transform: translate(0); }
}

@keyframes orbit {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes fast-orbit {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(720deg); }
}

/* responsive */
@media (max-width: 860px) {
  #profile-block, #skills-block { width: 92vw; max-width: 400px; padding: 16px; }
  .profile-header { flex-direction: column; align-items: center; }
  .profile-container { width: 120px; height: 120px; }
  .profile-picture { width: 120px; height: 120px; }
  .profile-info { align-items: center; text-align: center; }
  .name-and-badges { flex-direction: column; align-items: center; }
  #profile-name { font-size: 24px; }
  .badge-group { justify-content: center; }
  .social-links { justify-content: center; }
  .visitor-counter { align-self: center; }
  .controls { bottom: 20px; }
  .top-controls { bottom: 70px; }
}
</style>
</head>
<body>

<div class="custom-cursor" id="cursor"></div>

<div id="start-screen"><div id="start-text"></div></div>

<div class="container">
  <canvas id="background-canvas"></canvas>
  <div class="glitch-overlay"></div>
  <canvas id="overlay-canvas"></canvas>

  <!-- profile -->
  <div id="profile-block">
    <div class="profile-header">
      <div class="profile-container">
        <img src="https://i.imgur.com/mvPLW4j.png" alt="" class="profile-picture" onerror="this.style.display='none'">

  <div class="controls">
    <div class="theme-button active" data-theme="default">1</div>

        <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>

<script>
(function() {
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  if (isTouch) document.body.classList.add('touch-device');

  // cursor
  const cursor = document.getElementById('cursor');
  if (!isTouch) {
    document.addEventListener('mousemove', e => { cursor.style.left = e.clientX+'px'; cursor.style.top = e.clientY+'px'; });
    document.addEventListener('mousedown', () => { cursor.style.transform = 'translate(-50%,-50%) scale(0.85)'; });
    document.addEventListener('mouseup', () => { cursor.style.transform = 'translate(-50%,-50%) scale(1)'; });
    document.querySelectorAll('a, button, .theme-button, .badge, .profile-picture, .social-icon').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });
  } else { cursor.style.display = 'none'; }

  // background canvas
  const bc = document.getElementById('background-canvas');
  const bctx = bc.getContext('2d');
  let bw, bh, particles = [];

  function resizeBg() { bw = bc.width = window.innerWidth; bh = bc.height = window.innerHeight; }
  resizeBg(); window.addEventListener('resize', resizeBg);

  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random()*bw, y: Math.random()*bh,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: Math.random()*2+0.5, a: Math.random()*0.15+0.05
    });
  }

  function drawBg() {
    bctx.clearRect(0,0,bw,bh);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x<0) p.x=bw; if (p.x>bw) p.x=0;
      if (p.y<0) p.y=bh; if (p.y>bh) p.y=0;
      bctx.beginPath(); bctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      bctx.fillStyle = `rgba(255,255,255,${p.a})`;
      bctx.fill();
    }
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x-particles[j].x, dy = particles[i].y-particles[j].y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        if (dist < 120) {
          bctx.beginPath(); bctx.moveTo(particles[i].x,particles[i].y); bctx.lineTo(particles[j].x,particles[j].y);
          bctx.strokeStyle = `rgba(255,255,255,${0.02*(1-dist/120)})`;
          bctx.lineWidth = 0.5; bctx.stroke();
        }
      }
    }
    requestAnimationFrame(drawBg);
  }
  drawBg();

  // overlay canvas (matrix rain for hacker theme)
  const oc = document.getElementById('overlay-canvas');
  const octx = oc.getContext('2d');
  let ow, oh, cols, drops;

  function resizeOverlay() { ow = oc.width = window.innerWidth; oh = oc.height = window.innerHeight; }
  resizeOverlay(); window.addEventListener('resize', resizeOverlay);

  cols = Math.floor(ow/14); drops = Array(cols).fill(0);

  let overlayInterval = null;

  function startMatrix() {
    oc.style.display = 'block';
    if (overlayInterval) clearInterval(overlayInterval);
    overlayInterval = setInterval(() => {
      octx.fillStyle = 'rgba(0,0,0,0.05)'; octx.fillRect(0,0,ow,oh);
      octx.fillStyle = 'rgba(255,255,255,0.06)'; octx.font = '13px monospace';
      for (let i = 0; i < cols; i++) {
        const char = String.fromCharCode(0x30A0+Math.random()*96);
        octx.fillText(char, i*14, drops[i]*14);
        if (drops[i]*14 > oh && Math.random()>0.975) drops[i]=0;
        drops[i]++;
      }
    }, 60);
  }

  function stopMatrix() {
    if (overlayInterval) { clearInterval(overlayInterval); overlayInterval = null; }
    oc.style.display = 'none'; octx.clearRect(0,0,ow,oh);
    cols = Math.floor(ow/14); drops = Array(cols).fill(0);
  }

  // start screen
  const startScreen = document.getElementById('start-screen');
  const startText = document.getElementById('start-text');
  const profileName = document.getElementById('profile-name');
  const profileBio = document.getElementById('profile-bio');
  const visitorCount = document.getElementById('visitor-count');
  const profileBlock = document.getElementById('profile-block');
  const skillsBlock = document.getElementById('skills-block');
  const profileContainer = document.querySelector('.profile-container');
  const profilePicture = document.querySelector('.profile-picture');
  const glitchOverlay = document.querySelector('.glitch-overlay');

  // visitor
  let totalVisits = parseInt(localStorage.getItem('zc_visits')||'921234');
  if (!localStorage.getItem('zc_visited')) {
    totalVisits++; localStorage.setItem('zc_visits', totalVisits);
    localStorage.setItem('zc_visited', '1');
  }
  visitorCount.textContent = totalVisits.toLocaleString();

  // start typing
  const startMsg = "click to enter";
  let sIdx = 0, sCursor = true;

  function typeStart() {
    if (sIdx < startMsg.length) sIdx++;
    startText.textContent = startMsg.slice(0,sIdx)+(sCursor?'|':' ');
    setTimeout(typeStart, 80);
  }
  setInterval(() => { sCursor=!sCursor; startText.textContent = startMsg.slice(0,sIdx)+(sCursor?'|':' '); }, 500);
  typeStart();

  // name typing
  const name = "z c";
  let nIdx = 0, nDeleting = false, nCursor = true;

  function typeName() {
    if (!nDeleting && nIdx < name.length) nIdx++;
    else if (nDeleting && nIdx > 0) nIdx--;
    else if (nIdx === name.length) { nDeleting = true; setTimeout(typeName, 8000); return; }
    else if (nIdx === 0) { nDeleting = false; }
    profileName.textContent = name.slice(0,nIdx)+(nCursor?'|':' ');
    if (Math.random()<0.08) { profileName.classList.add('glitch-text'); setTimeout(()=>profileName.classList.remove('glitch-text'),200); }
    setTimeout(typeName, nDeleting ? 120 : 200);
  }
  setInterval(() => { nCursor=!nCursor; profileName.textContent = name.slice(0,nIdx)+(nCursor?'|':' '); }, 500);

  // bio typing
  const bios = ["z c", "mon blaze", "noir & blanc"];
  let bMsg = 0, bIdx = 0, bDeleting = false, bCursor = true;

  function typeBio() {
    const line = bios[bMsg];
    if (!bDeleting && bIdx < line.length) bIdx++;
    else if (bDeleting && bIdx > 0) bIdx--;
    else if (bIdx === line.length) { bDeleting = true; setTimeout(typeBio, 2000); return; }
    else if (bIdx === 0 && bDeleting) { bDeleting = false; bMsg = (bMsg+1)%bios.length; }
    profileBio.textContent = line.slice(0,bIdx)+(bCursor?'|':' ');
    if (Math.random()<0.08) { profileBio.classList.add('glitch-text'); setTimeout(()=>profileBio.classList.remove('glitch-text'),200); }
    setTimeout(typeBio, bDeleting ? 60 : 120);
  }
  setInterval(() => { bCursor=!bCursor; }, 500);

  // reveal
  function reveal() {
    startScreen.classList.add('hidden');
    profileBlock.classList.remove('hidden');
    profileBlock.style.opacity = '1';
    profileContainer.classList.add('orbit');
    typeName();
    typeBio();
    // glitch periodically
    setInterval(() => {
      if (Math.random()>0.6) {
        glitchOverlay.style.opacity = '0.3';
        setTimeout(() => glitchOverlay.style.opacity = '0', 150);
      }
    }, 5000);
  }

  startScreen.addEventListener('click', reveal);
  startScreen.addEventListener('touchstart', e => { e.preventDefault(); reveal(); });

  // profile picture fast orbit
  profilePicture.addEventListener('click', () => {
    profileContainer.classList.remove('fast-orbit','orbit');
    void profileContainer.offsetWidth;
    profileContainer.classList.add('fast-orbit');
    setTimeout(() => { profileContainer.classList.remove('fast-orbit'); void profileContainer.offsetWidth; profileContainer.classList.add('orbit'); }, 500);
  });
  profilePicture.addEventListener('touchstart', e => {
    e.preventDefault();
    profileContainer.classList.remove('fast-orbit','orbit');
    void profileContainer.offsetWidth;
    profileContainer.classList.add('fast-orbit');
    setTimeout(() => { profileContainer.classList.remove('fast-orbit'); void profileContainer.offsetWidth; profileContainer.classList.add('orbit'); }, 500);
  });

  // tilt
  function applyTilt(e, el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left+rect.width/2, cy = rect.top+rect.height/2;
    const x = (e.clientX||e.touches[0].clientX)-cx, y = (e.clientY||e.touches[0].clientY)-cy;
    const tiltX = (y/rect.height)*8, tiltY = -(x/rect.width)*8;
    el.style.transform = `translate(-50%,-50%) perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
  }
  function resetTilt(el) { el.style.transform = 'translate(-50%,-50%) perspective(1000px) rotateX(0deg) rotateY(0deg)'; }

  if (!isTouch) {
    profileBlock.addEventListener('mousemove', e => applyTilt(e, profileBlock));
    profileBlock.addEventListener('mouseleave', () => resetTilt(profileBlock));
  }

  // skills toggle
  const resultsBtn = document.getElementById('results-theme');
  const resultsHint = document.getElementById('results-hint');
  const resultsBtnContainer = document.getElementById('results-button-container');
  let showingSkills = false;

  function toggleSkills() {
    if (!showingSkills) {
      profileBlock.style.opacity = '0'; profileBlock.style.pointerEvents = 'none';
      setTimeout(() => { profileBlock.classList.add('hidden'); skillsBlock.classList.remove('hidden');
        skillsBlock.style.opacity = '1';
        document.getElementById('bar1').style.width = '87%';
        document.getElementById('bar2').style.width = '80%';
        document.getElementById('bar3').style.width = '65%';
        document.getElementById('bar4').style.width = '55%';
      }, 400);
      resultsHint.classList.remove('hidden'); showingSkills = true;
    } else {
      skillsBlock.style.opacity = '0';
      setTimeout(() => { skillsBlock.classList.add('hidden'); profileBlock.classList.remove('hidden');
        profileBlock.style.opacity = '1'; profileBlock.style.pointerEvents = 'auto';
      }, 400);
      resultsHint.classList.add('hidden'); showingSkills = false;
    }
  }
  resultsBtn.addEventListener('click', toggleSkills);
  resultsBtn.addEventListener('touchstart', e => { e.preventDefault(); toggleSkills(); });

  // theme buttons
  const themeBtns = document.querySelectorAll('.theme-button');
  let currentTheme = 'default';

  themeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      themeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTheme = btn.dataset.theme;
      switchTheme(currentTheme);
    });
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      themeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentTheme = btn.dataset.theme;
      switchTheme(currentTheme);
    });
  });

  function switchTheme(theme) {
    if (theme === 'hacker') { startMatrix(); resultsBtnContainer.classList.remove('hidden'); }
    else { stopMatrix(); resultsBtnContainer.classList.add('hidden');
      if (showingSkills) { skillsBlock.classList.add('hidden'); profileBlock.classList.remove('hidden');
        profileBlock.style.opacity = '1'; profileBlock.style.pointerEvents = 'auto';
        showingSkills = false; resultsHint.classList.add('hidden');
        document.getElementById('bar1').style.width = '0%';
        document.getElementById('bar2').style.width = '0%';
        document.getElementById('bar3').style.width = '0%';
        document.getElementById('bar4').style.width = '0%';
      }
    }
    // flash overlay
    glitchOverlay.style.opacity = '0.5';
    setTimeout(() => glitchOverlay.style.opacity = '0', 200);
  }

  // volume
  const volSlider = document.getElementById('volume-slider');
  const volIcon = document.getElementById('volume-icon');
  let muted = false, vol = 0.5;

  volSlider.addEventListener('input', () => {
    vol = parseFloat(volSlider.value); muted = false;
    volIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>`;
  });
  volIcon.addEventListener('click', () => {
    muted = !muted;
    volIcon.innerHTML = muted
      ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2"/>`
      : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"/>`;
  });

  // transparency
  const transSlider = document.getElementById('transparency-slider');
  transSlider.addEventListener('input', () => {
    const o = parseFloat(transSlider.value);
    profileBlock.style.background = `rgba(0,0,0,${o})`;
    skillsBlock.style.background = `rgba(0,0,0,${o})`;
  });
})();
</script>
</body>
</html>
