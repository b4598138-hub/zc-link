<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>z c</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .container {
    width: 100%;
    max-width: 640px;
    padding: 24px;
  }
  .brand {
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -4px;
    text-align: center;
    margin-bottom: 48px;
    user-select: none;
  }
  .brand span { color: #fff; }
  .input-group {
    display: flex;
    gap: 0;
    margin-bottom: 16px;
  }
  .input-group input {
    flex: 1;
    padding: 16px 20px;
    font-size: 18px;
    background: #111;
    border: 2px solid #222;
    color: #fff;
    outline: none;
    transition: border-color 0.15s;
    border-radius: 0;
  }
  .input-group input::placeholder { color: #444; }
  .input-group input:focus { border-color: #fff; }
  .input-group button {
    padding: 16px 28px;
    font-size: 18px;
    font-weight: 700;
    background: #fff;
    color: #000;
    border: 2px solid #fff;
    cursor: pointer;
    transition: opacity 0.15s;
    border-radius: 0;
  }
  .input-group button:hover { opacity: 0.8; }
  .input-group button:disabled { opacity: 0.4; cursor: not-allowed; }
  .result {
    display: none;
    margin-top: 16px;
    padding: 16px 20px;
    background: #111;
    border: 2px solid #222;
    font-size: 18px;
    align-items: center;
    gap: 12px;
  }
  .result a {
    color: #fff;
    text-decoration: underline;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .result button {
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 600;
    background: #fff;
    color: #000;
    border: none;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .result button:hover { opacity: 0.8; }
  .error {
    display: none;
    margin-top: 12px;
    padding: 12px 16px;
    background: #1a0000;
    border: 1px solid #330000;
    color: #ff4444;
    font-size: 14px;
  }
  .footer {
    margin-top: 64px;
    text-align: center;
    font-size: 14px;
    color: #333;
  }
  .stats {
    margin-top: 32px;
    display: flex;
    justify-content: center;
    gap: 48px;
    font-size: 14px;
    color: #444;
  }
  .stats span { color: #666; font-weight: 700; }
  @media (max-width: 480px) {
    .brand { font-size: 64px; }
    .input-group { flex-direction: column; }
    .input-group button { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="brand">z c</div>

  <div class="input-group">
    <input type="url" id="urlInput" placeholder="colle ton lien ici" autofocus>
    <button id="shortenBtn">raccourcir</button>
  </div>

  <div class="result" id="result">
    <a id="shortLink" href="#" target="_blank"></a>
    <button id="copyBtn">copier</button>
  </div>

  <div class="error" id="error"></div>

  <div class="stats">
    <div><span id="totalLinks">0</span> liens</div>
  </div>

  <div class="footer">z c — raccourcisseur de liens</div>
</div>

<script>
  const urlInput = document.getElementById('urlInput');
  const shortenBtn = document.getElementById('shortenBtn');
  const result = document.getElementById('result');
  const shortLink = document.getElementById('shortLink');
  const copyBtn = document.getElementById('copyBtn');
  const error = document.getElementById('error');
  const totalLinks = document.getElementById('totalLinks');

  async function shorten() {
    const url = urlInput.value.trim();
    if (!url) return;

    error.style.display = 'none';
    result.style.display = 'none';
    shortenBtn.disabled = true;
    shortenBtn.textContent = '...';

    try {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Erreur inconnue');
        return;
      }

      shortLink.href = data.shortUrl;
      shortLink.textContent = data.shortUrl;
      result.style.display = 'flex';
      urlInput.value = '';
      fetchStats();
    } catch (e) {
      showError('Impossible de contacter le serveur');
    } finally {
      shortenBtn.disabled = false;
      shortenBtn.textContent = 'raccourcir';
    }
  }

  function showError(msg) {
    error.textContent = msg;
    error.style.display = 'block';
  }

  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(shortLink.href);
      copyBtn.textContent = 'copié !';
      setTimeout(() => { copyBtn.textContent = 'copier'; }, 1500);
    } catch { }
  });

  shortenBtn.addEventListener('click', shorten);
  urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') shorten(); });

  async function fetchStats() {
    try {
      const res = await fetch('/api/shorten');
      if (res.ok) {
        const data = await res.json();
        totalLinks.textContent = data.total || 0;
      }
    } catch { }
  }

  fetchStats();
</script>
</body>
</html>
